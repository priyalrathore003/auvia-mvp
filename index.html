<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auvia — AI Vocal Enhancement</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #000000;
    --surface:   #0D0D0D;
    --surface2:  #141414;
    --border:    #1E1E1E;
    --border2:   #2A2A2A;
    --pink:      #E879B0;
    --blue:      #5B8DEF;
    --grad:      linear-gradient(135deg, #E879B0 0%, #9B6FE8 50%, #5B8DEF 100%);
    --grad-text: linear-gradient(135deg, #E879B0, #9B6FE8, #5B8DEF);
    --glow:      rgba(155, 111, 232, 0.15);
    --text:      #FFFFFF;
    --text-mid:  #888888;
    --text-dim:  #444444;
    --font:      'Syne', sans-serif;
    --mono:      'IBM Plex Mono', monospace;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2.5rem 1.5rem;
    gap: 3rem;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin-bottom: 0.8rem;
  }

  .logo-a {
    width: 44px;
    height: 44px;
  }

  .wordmark {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -0.01em;
    line-height: 1;
    background: var(--grad-text);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-top: 0.4rem;
  }

  /* ── Upload ── */
  #upload-state {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 0;
    animation: fadeUp 0.6s 0.1s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .drop-zone {
    width: 100%;
    border: 1px dashed var(--border2);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    padding: 3.5rem 2rem 3rem;
    text-align: center;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
    cursor: default;
  }
  .drop-zone.over {
    border-color: #9B6FE8;
    background: var(--glow);
  }
  .drop-zone::after {
    content: 'DROP FILE HERE';
    position: absolute;
    bottom: 1.1rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--text-dim);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .drop-zone.over::after { opacity: 1; }

  /* Animated waveform icon */
  .wave-idle {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 5px;
    height: 48px;
    margin-bottom: 1.6rem;
  }
  .wave-idle span {
    display: block;
    width: 5px;
    border-radius: 3px;
    background: var(--grad);
    animation: idleBar 2s ease-in-out infinite;
  }
  .wave-idle span:nth-child(1) { height: 16px; animation-delay: 0.0s; }
  .wave-idle span:nth-child(2) { height: 28px; animation-delay: 0.1s; }
  .wave-idle span:nth-child(3) { height: 42px; animation-delay: 0.2s; }
  .wave-idle span:nth-child(4) { height: 48px; animation-delay: 0.3s; }
  .wave-idle span:nth-child(5) { height: 36px; animation-delay: 0.4s; }
  .wave-idle span:nth-child(6) { height: 24px; animation-delay: 0.5s; }
  .wave-idle span:nth-child(7) { height: 16px; animation-delay: 0.6s; }

  .drop-label {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .drop-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-mid);
    line-height: 1.7;
  }
  .drop-formats {
    margin-top: 0.8rem;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #file-input { display: none; }

  .btn-browse {
    width: 100%;
    padding: 1.1rem;
    background: var(--grad);
    border: none;
    border-radius: 0 0 12px 12px;
    color: #fff;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-browse:hover  { opacity: 0.9; }
  .btn-browse:active { transform: scale(0.99); }

  /* ── Processing ── */
  #processing-state {
    width: 100%;
    max-width: 560px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    animation: fadeUp 0.4s ease both;
  }

  .wave-live {
    display: flex;
    align-items: center;
    gap: 5px;
    height: 64px;
  }
  .wave-live span {
    display: block;
    width: 5px;
    border-radius: 3px;
    background: var(--grad);
    animation: liveWave 1s ease-in-out infinite;
  }
  .wave-live span:nth-child(1)  { animation-delay: 0.00s; }
  .wave-live span:nth-child(2)  { animation-delay: 0.07s; }
  .wave-live span:nth-child(3)  { animation-delay: 0.14s; }
  .wave-live span:nth-child(4)  { animation-delay: 0.21s; }
  .wave-live span:nth-child(5)  { animation-delay: 0.28s; }
  .wave-live span:nth-child(6)  { animation-delay: 0.35s; }
  .wave-live span:nth-child(7)  { animation-delay: 0.42s; }
  .wave-live span:nth-child(8)  { animation-delay: 0.49s; }
  .wave-live span:nth-child(9)  { animation-delay: 0.56s; }
  .wave-live span:nth-child(10) { animation-delay: 0.63s; }
  .wave-live span:nth-child(11) { animation-delay: 0.70s; }
  .wave-live span:nth-child(12) { animation-delay: 0.77s; }
  .wave-live span:nth-child(13) { animation-delay: 0.84s; }
  .wave-live span:nth-child(14) { animation-delay: 0.91s; }

  .proc-status {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    background: var(--grad-text);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .proc-file {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-mid);
    text-align: center;
    margin-top: 0.3rem;
  }
  .proc-note {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.9;
    margin-top: 0.5rem;
  }

  /* ── Error ── */
  #error-msg {
    display: none;
    width: 100%;
    max-width: 560px;
    padding: 1rem 1.25rem;
    border: 1px solid rgba(232, 121, 176, 0.3);
    border-radius: 8px;
    background: rgba(232, 121, 176, 0.05);
    font-family: var(--mono);
    font-size: 11px;
    color: #E879B0;
    line-height: 1.8;
    white-space: pre-wrap;
  }

  /* ── Result ── */
  #result-state {
    width: 100%;
    max-width: 560px;
    display: none;
    flex-direction: column;
    gap: 1.25rem;
    animation: fadeUp 0.5s ease both;
  }

  .result-title {
    font-size: 28px;
    font-weight: 800;
    text-align: center;
  }
  .result-title span {
    background: var(--grad-text);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .players {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .pcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
  }
  .pcard.enhanced {
    border-color: #2A1F35;
    background: linear-gradient(160deg, #110D18, #0D0D0D);
    box-shadow: 0 0 30px rgba(155,111,232,0.08);
  }

  .plabel {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .pcard.enhanced .plabel {
    background: var(--grad-text);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .pname {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mid);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  canvas.wv {
    width: 100%;
    height: 44px;
    background: var(--bg);
    border-radius: 6px;
    display: block;
  }

  .pcontrols {
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .btn-play {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-mid);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    transition: border-color 0.2s, background 0.2s;
  }
  .pcard.enhanced .btn-play {
    border-color: #9B6FE8;
    color: #9B6FE8;
  }
  .btn-play:hover {
    background: var(--glow);
    border-color: #E879B0;
    color: #E879B0;
  }

  .pbar {
    flex: 1;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
  }
  .pbar-fill {
    height: 100%;
    width: 0%;
    border-radius: 2px;
    background: var(--border2);
    transition: width 0.1s linear;
    pointer-events: none;
  }
  .pcard.enhanced .pbar-fill { background: var(--grad); }

  .ptime {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    min-width: 28px;
    text-align: right;
  }

  .btn-download {
    width: 100%;
    padding: 1.1rem;
    background: var(--grad);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-download:hover { opacity: 0.88; }

  .btn-reset {
    width: 100%;
    padding: 0.8rem;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 12px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-reset:hover { border-color: var(--border2); color: var(--text-mid); }

  /* ── Footer ── */
  footer {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.14em;
    animation: fadeUp 0.6s 0.2s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes idleBar {
    0%,100% { opacity: 0.35; transform: scaleY(0.5); }
    50%      { opacity: 1;   transform: scaleY(1); }
  }
  @keyframes liveWave {
    0%,100% { height: 6px;  opacity: 0.4; }
    50%      { height: 58px; opacity: 1; }
  }

  @media (max-width: 500px) {
    .players  { grid-template-columns: 1fr; }
    .wordmark { font-size: 40px; }
  }
</style>
</head>

    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  <div>
    <div class="proc-status" id="proc-status">Analysing audio...</div>
    <div class="proc-file"   id="proc-file"></div>
    <div class="proc-note">
      Processing on cloud engine<br>
      Typically 15 – 45 seconds
    </div>
  </div>
</section>

<!-- Error -->
<div id="error-msg" role="alert"></div>

<!-- Result -->
<section id="result-state">
  <div class="result-title">Enhancement <span>complete</span></div>
  <div class="players">
    <div class="pcard">
      <div class="plabel">Original</div>
      <div class="pname" id="orig-name">—</div>
      <canvas class="wv" id="cv-orig" width="240" height="44"></canvas>
      <div class="pcontrols">
        <button class="btn-play" id="btn-orig">&#9654;</button>
        <div class="pbar"><div class="pbar-fill" id="fill-orig"></div></div>
        <div class="ptime" id="t-orig">0:00</div>
      </div>
      <audio id="aud-orig"></audio>
    </div>
    <div class="pcard enhanced">
      <div class="plabel">Enhanced</div>
      <div class="pname">auvia_enhanced.wav</div>
      <canvas class="wv" id="cv-enh" width="240" height="44"></canvas>
      <div class="pcontrols">
        <button class="btn-play" id="btn-enh">&#9654;</button>
        <div class="pbar"><div class="pbar-fill" id="fill-enh"></div></div>
        <div class="ptime" id="t-enh">0:00</div>
      </div>
      <audio id="aud-enh"></audio>
    </div>
  </div>
  <button class="btn-download" id="btn-dl">&#8659; &nbsp; Download Enhanced WAV</button>
  <button class="btn-reset" onclick="reset()">Process Another File</button>
</section>

<footer>auviamusic.com</footer>

<script>
const API = 'https://api.auviamusic.com/process-vocal/';

let origUrl = null, enhUrl = null, currentFile = null;

const uploadEl  = document.getElementById('upload-state');
const procEl    = document.getElementById('processing-state');
const resultEl  = document.getElementById('result-state');
const errorEl   = document.getElementById('error-msg');
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const btnBrowse = document.getElementById('btn-browse');
const procSt    = document.getElementById('proc-status');
const procFn    = document.getElementById('proc-file');
const audOrig   = document.getElementById('aud-orig');
const audEnh    = document.getElementById('aud-enh');
const btnOrig   = document.getElementById('btn-orig');
const btnEnh    = document.getElementById('btn-enh');
const fillOrig  = document.getElementById('fill-orig');
const fillEnh   = document.getElementById('fill-enh');
const tOrig     = document.getElementById('t-orig');
const tEnh      = document.getElementById('t-enh');
const btnDl     = document.getElementById('btn-dl');

const statuses = [
  'Analysing audio...',
  'Removing background noise...',
  'Shaping spectral profile...',
  'Boosting vocal warmth...',
  'Lifting presence...',
  'Reconstructing waveform...',
  'Normalising levels...',
  'Finalising...',
];
let stTimer = null, stIdx = 0;
const startStatus = () => {
  stIdx = 0; procSt.textContent = statuses[0];
  stTimer = setInterval(() => { stIdx = (stIdx+1)%statuses.length; procSt.textContent = statuses[stIdx]; }, 3500);
};
const stopStatus = () => clearInterval(stTimer);

const show = el => el.style.display = 'flex';
const hide = el => el.style.display = 'none';
const fmt  = s  => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
const showError = m => { errorEl.textContent = m; errorEl.style.display = 'block'; };
const hideError = () => { errorEl.style.display = 'none'; };

// Drop zone — drag & drop ONLY (no click)
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

// Button — click to browse ONLY
btnBrowse.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  currentFile = file;
  hideError();
  if (file.size > 10 * 1024 * 1024) {
    showError(`File is ${(file.size/1024/1024).toFixed(1)} MB — maximum is 10 MB.`);
    return;
  }
  hide(uploadEl);
  show(procEl);
  procFn.textContent = file.name;
  startStatus();
  try {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch(API, { method: 'POST', body: fd });
    if (!res.ok) throw new Error(`Engine error ${res.status}: ${await res.text()}`);
    const enhBlob = await res.blob();
    stopStatus();
    await showResult(file, enhBlob);
  } catch (err) {
    stopStatus();
    hide(procEl);
    show(uploadEl);
    showError(`Processing failed: ${err.message}\n\nIf first request in a while, the engine may be waking — wait 30s and retry.`);
  }
}

async function showResult(origFile, enhBlob) {
  if (origUrl) URL.revokeObjectURL(origUrl);
  if (enhUrl)  URL.revokeObjectURL(enhUrl);
  origUrl = URL.createObjectURL(origFile);
  enhUrl  = URL.createObjectURL(enhBlob);
  audOrig.src = origUrl;
  audEnh.src  = enhUrl;
  document.getElementById('orig-name').textContent = origFile.name;
  await Promise.all([
    drawWaveform(origFile, 'cv-orig', '#2A2A2A'),
    drawWaveform(enhBlob,  'cv-enh',  '#9B6FE8'),
  ]);
  hide(procEl);
  show(resultEl);
  wirePlayer(audOrig, btnOrig, fillOrig, tOrig);
  wirePlayer(audEnh,  btnEnh,  fillEnh,  tEnh);
  btnDl.onclick = () => {
    const a = Object.assign(document.createElement('a'), { href: enhUrl, download: 'auvia_enhanced.wav' });
    a.click();
  };
}

async function drawWaveform(blob, canvasId, color) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  try {
    const buf     = await blob.arrayBuffer();
    const actx    = new (window.AudioContext||window.webkitAudioContext)();
    const decoded = await actx.decodeAudioData(buf);
    await actx.close();
    const data = decoded.getChannelData(0);
    const cols = Math.floor(W / 3);
    if (canvasId === 'cv-enh') {
      const grad = ctx.createLinearGradient(0,0,W,0);
      grad.addColorStop(0,   '#E879B0');
      grad.addColorStop(0.5, '#9B6FE8');
      grad.addColorStop(1,   '#5B8DEF');
      ctx.fillStyle = grad;
    } else {
      ctx.fillStyle = color;
    }
    for (let i = 0; i < cols; i++) {
      const s = Math.floor(i * data.length / cols);
      const e = Math.floor((i+1) * data.length / cols);
      let max = 0;
      for (let j = s; j < e; j++) { const v = Math.abs(data[j]); if (v > max) max = v; }
      const bh = Math.max(2, max * H * 0.92);
      ctx.beginPath();
      ctx.roundRect(i*3, (H-bh)/2, 2, bh, 1);
      ctx.fill();
    }
  } catch {
    ctx.fillStyle = color;
    for (let i = 0; i < 70; i++) {
      const h = 3 + Math.random()*34;
      ctx.fillRect(i*(W/70),(H-h)/2,2,h);
    }
  }
}

function wirePlayer(aud, btn, fill, timeEl) {
  btn.addEventListener('click', () => {
    if (aud.paused) { audOrig.pause(); audEnh.pause(); aud.play(); } else aud.pause();
  });
  aud.addEventListener('play',       () => btn.innerHTML = '&#9646;&#9646;');
  aud.addEventListener('pause',      () => btn.innerHTML = '&#9654;');
  aud.addEventListener('ended',      () => { btn.innerHTML = '&#9654;'; fill.style.width = '0%'; });
  aud.addEventListener('timeupdate', () => {
    if (!aud.duration) return;
    fill.style.width = (aud.currentTime/aud.duration*100)+'%';
    timeEl.textContent = fmt(aud.currentTime);
  });
}

function reset() {
  [audOrig,audEnh].forEach(a => { a.pause(); a.src=''; });
  [btnOrig,btnEnh].forEach(b => b.innerHTML = '&#9654;');
  [fillOrig,fillEnh].forEach(f => f.style.width='0%');
  [tOrig,tEnh].forEach(t => t.textContent='0:00');
  fileInput.value = '';
  hide(resultEl); hideError(); show(uploadEl);
}
</script>
</body>
</html>
